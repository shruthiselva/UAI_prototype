/* ============================================================
   UAI — Unified Athlete Interface
   Design language v2: "Field Notes" — warm editorial paper,
   serif headlines, terracotta accent, mint trust signals.
   Calm, premium, human — not a dark SaaS dashboard.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root,
[data-theme="light"] {
  --bg: #F4F1EA;
  --bg-elev: #FBFAF6;
  --surface: #FFFFFF;
  --surface-2: #F0ECE2;
  --surface-3: #E7E1D3;
  --line: #E3DDCD;
  --line-soft: #ECE7DA;
  --text: #1C2127;
  --text-dim: #65686F;
  --text-faint: #98948A;
  --primary: #D2672E;
  --primary-dim: rgba(210, 103, 46, .12);
  --primary-text: #B6531F;
  --signal: #1F8A5F;
  --signal-dim: #DCEFE3;
  --ember: #C23B2B;
  --ember-dim: rgba(194, 59, 43, .10);
  --gold: #A87A1E;
  --gold-dim: rgba(168, 122, 30, .12);
  --navy: #161A22;
  --navy-soft: #2A2F3A;
  --shadow: 0 10px 28px rgba(28, 33, 39, .08);
}

[data-theme="dark"] {
  --bg: #14161B;
  --bg-elev: #191C22;
  --surface: #1E222A;
  --surface-2: #262B34;
  --surface-3: #30363F;
  --line: #353B45;
  --line-soft: #2A2F38;
  --text: #F1EFE9;
  --text-dim: #ACA89E;
  --text-faint: #767268;
  --primary: #E4793D;
  --primary-dim: rgba(228, 121, 61, .16);
  --primary-text: #F0935A;
  --signal: #3FB387;
  --signal-dim: rgba(63, 179, 135, .16);
  --ember: #E15A47;
  --ember-dim: rgba(225, 90, 71, .15);
  --gold: #D2A23F;
  --gold-dim: rgba(210, 162, 63, .15);
  --navy: #0E1014;
  --navy-soft: #1A1D24;
  --shadow: 0 14px 32px rgba(0,0,0,.4);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::selection { background: var(--primary-dim); }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
.mono { font-family: 'JetBrains Mono', monospace; }
.serif { font-family: 'Lora', serif; }
.display { font-family: 'Lora', serif; font-weight: 600; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- App shell ---------- */
#app-shell { min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 26px;
  background: var(--navy);
}
.brand { display: flex; align-items: center; gap: 9px; }
.brand-name { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; font-weight: 600; color: #EDEAE0; }
.brand-sub { font-size: 10px; color: #8B8E98; letter-spacing: .1em; text-transform: uppercase; margin-left: 8px; }

.role-switch { display: flex; gap: 4px; }
.role-switch button {
  border: none; background: transparent; color: #B7B9C3;
  padding: 8px 17px; border-radius: 999px; font-size: 13px; font-weight: 600;
  letter-spacing: .01em; transition: all .15s ease;
}
.role-switch button.active { background: var(--primary); color: #fff; }
.role-switch button:not(.active):hover { color: #fff; }

.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-hint { font-size: 12px; color: #82858F; font-style: italic; }
.theme-toggle {
  border: 1px solid #333742; background: transparent; color: #B7B9C3;
  width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.theme-toggle:hover { color: #fff; border-color: #4A4E5A; }

/* ---------- Secondary nav (screen tabs within a role) ---------- */
.subnav {
  display: flex; gap: 6px; padding: 14px 26px; flex-wrap: wrap;
  background: var(--bg); border-bottom: 1px solid var(--line);
}
.subnav button {
  border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
  padding: 7px 15px; border-radius: 999px; font-size: 12.5px; font-weight: 600;
}
.subnav button.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.subnav button:not(.active):hover { border-color: var(--text-faint); color: var(--text); }

/* ---------- Layout ---------- */
.layout { display: flex; flex: 1; }
.content { flex: 1; padding: 36px 26px 70px; max-width: 1280px; margin: 0 auto; width: 100%; }
.content.narrow { max-width: 540px; }

/* ---------- Typography ---------- */
h1.page-title { font-family: 'Lora', serif; font-size: 26px; font-weight: 700; letter-spacing: -.01em; margin: 0 0 6px; color: var(--text); }
.page-sub { color: var(--text-dim); font-size: 14px; margin: 0 0 24px; line-height: 1.55; }
.eyebrow { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); font-weight: 700; }
.section-title { font-family: 'Lora', serif; font-size: 19px; font-weight: 700; margin: 0 0 14px; color: var(--text); }

.lane-rule { height: 1px; background: var(--line); margin: 22px 0; }

/* ---------- Cards & components ---------- */
.card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  padding: 20px; transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  box-shadow: 0 1px 2px rgba(28,33,39,.03);
}
.card.hoverable:hover { border-color: var(--text-faint); transform: translateY(-1px); box-shadow: var(--shadow); }
.grid { display: grid; gap: 14px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.row { display: flex; gap: 14px; }
.col { display: flex; flex-direction: column; }
.between { justify-content: space-between; align-items: center; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  border-radius: 12px; padding: 13px 18px; font-size: 14.5px; font-weight: 700;
  border: 1px solid transparent; transition: all .14s ease; font-family: 'Inter', sans-serif;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { filter: brightness(1.06); }
.btn-ghost { background: var(--surface-2); color: var(--text); border-color: var(--line); }
.btn-ghost:hover { border-color: var(--text-faint); }
.btn-outline { background: transparent; color: var(--primary-text); border-color: var(--primary); }
.btn-block { width: 100%; }
.btn-sm { padding: 8px 13px; font-size: 12.5px; border-radius: 9px; }

.badge {
  display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700;
  padding: 6px 12px; border-radius: 999px; letter-spacing: .01em; border: 1px solid transparent;
}
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .8; }
.badge-verified { background: var(--signal-dim); color: var(--signal); }
.badge-critical { background: var(--ember-dim); color: var(--ember); }
.badge-high { background: var(--gold-dim); color: var(--gold); }
.badge-planned { background: var(--surface-3); color: var(--text-dim); }
.badge-open { background: var(--signal-dim); color: var(--signal); }
.badge-partial { background: var(--gold-dim); color: var(--gold); }
.badge-locked { background: var(--ember-dim); color: var(--ember); }
.badge-primary { background: var(--primary-dim); color: var(--primary-text); }

.avatar {
  border-radius: 50%; object-fit: cover; background: var(--navy); display: block;
}

.progress-track { height: 8px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width .8s cubic-bezier(.2,.8,.2,1); }

.input, .textarea, select.input {
  width: 100%; background: var(--surface); border: 1px solid var(--line); color: var(--text);
  border-radius: 10px; padding: 11px 13px; font-size: 14px; font-family: inherit;
}
.input:focus, .textarea:focus, select.input:focus { outline: none; border-color: var(--primary); }
.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 15px; }
.field label { font-size: 12.5px; font-weight: 700; color: var(--text-dim); }

.chip {
  display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
  font-size: 12.5px; font-weight: 600;
}
.chip.active { background: var(--navy); border-color: var(--navy); color: #fff; }

.stat-card { display: flex; flex-direction: column; gap: 6px; }
.stat-value { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; }
.stat-label { font-size: 12.5px; color: var(--text-dim); }
.stat-trend { font-size: 11.5px; font-weight: 700; }
.trend-up { color: var(--signal); }
.trend-down { color: var(--ember); }

/* gauge — signature element: warm arc credibility gauge */
.gauge-wrap { display: flex; align-items: center; gap: 18px; }
.gauge-num { font-family: 'Lora', serif; font-size: 42px; font-weight: 700; line-height: 1; }
.gauge-of { font-size: 14px; color: var(--text-faint); font-family: 'Inter'; font-weight: 500; }

/* timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1px; background: var(--line); }
.timeline-item { position: relative; padding-bottom: 24px; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-dot { position: absolute; left: -24px; top: 3px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--primary); }
.timeline-dot.verified { background: var(--signal); box-shadow: 0 0 0 1px var(--signal); }
.timeline-date { font-size: 11.5px; color: var(--text-faint); font-weight: 600; }

/* feed card */
.feed-card { display: flex; gap: 13px; }
.feed-icon { width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 17px; }

/* filters sidebar (sponsor) */
.filter-block { margin-bottom: 20px; }
.filter-title { font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 9px; text-transform: uppercase; letter-spacing: .05em; }
.range-display { font-size: 11.5px; color: var(--text-faint); font-weight: 600; }

/* table */
table.data-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.data-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); padding: 11px 12px; border-bottom: 1px solid var(--line); font-weight: 700; }
table.data-table td { padding: 13px 12px; border-bottom: 1px solid var(--line-soft); }
table.data-table tr:last-child td { border-bottom: none; }
table.data-table tr:hover td { background: var(--surface-2); }

/* tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
.tabs button { background: none; border: none; padding: 10px 4px; margin-right: 20px; color: var(--text-faint); font-size: 13.5px; font-weight: 700; border-bottom: 2px solid transparent; }
.tabs button.active { color: var(--text); border-color: var(--primary); }

/* match score ring */
.match-ring {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Lora', serif; font-weight: 700; font-size: 16px;
  background: conic-gradient(var(--signal) calc(var(--pct) * 1%), var(--surface-3) 0);
  position: relative;
}
.match-ring::after { content: ''; position: absolute; inset: 5px; background: var(--surface); border-radius: 50%; }
.match-ring span { position: relative; z-index: 1; }

/* utility */
.muted { color: var(--text-dim); }
.faint { color: var(--text-faint); }
.flex { display: flex; }
.gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-10 { gap: 10px; } .gap-14 { gap: 14px; }
.wrap { flex-wrap: wrap; }
.mt-8 { margin-top: 8px; } .mt-14 { margin-top: 14px; } .mt-20 { margin-top: 20px; } .mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; } .mb-14 { margin-bottom: 14px; }
.text-right { text-align: right; }
.center { text-align: center; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.enter { animation: fadeUp .35s ease both; }
.enter-1 { animation-delay: .03s; } .enter-2 { animation-delay: .07s; } .enter-3 { animation-delay: .11s; }
.enter-4 { animation-delay: .15s; } .enter-5 { animation-delay: .19s; }

@media (prefers-reduced-motion: reduce) { .enter, .progress-fill { animation: none !important; transition: none !important; } }

@media (max-width: 900px) {
  .content { padding: 22px 16px; }
  .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .topbar { padding: 12px 16px; }
  .topbar-hint { display: none; }
}

function athlete(id){ return ATHLETES.find(a=>a.id===id); }
function money(n){ return '₹' + n.toLocaleString('en-IN'); }
function badgeForUrgency(u){
  const cls = u==='Critical' ? 'badge-critical' : u==='High Priority' ? 'badge-high' : 'badge-planned';
  return `<span class="badge ${cls}">${u}</span>`;
}
function badgeForStatus(s){
  const cls = s==='OPEN' ? 'badge-open' : s==='PARTIAL' ? 'badge-partial' : 'badge-locked';
  return `<span class="badge ${cls}">${s}</span>`;
}
function avatarChip(a, size=44){
  return `<div class="avatar enter" style="${avatarStyle(a.id)} width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:600;color:#fff;font-size:${size*0.36}px;">${initials(a.name)}</div>`;
}
function gaugeArc(score){
  // semicircular lane-arc gauge, signature element
  const pct = score/100;
  const r = 70, cx = 90, cy = 90;
  const startAngle = Math.PI, endAngle = Math.PI - pct*Math.PI;
  const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
  const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
  const largeArc = pct > 0.5 ? 1 : 0;
  const ticks = [];
  for(let i=0;i<=10;i++){
    const a = Math.PI - (i/10)*Math.PI;
    const tx1 = cx + (r+6)*Math.cos(a), ty1 = cy + (r+6)*Math.sin(a);
    const tx2 = cx + (r+12)*Math.cos(a), ty2 = cy + (r+12)*Math.sin(a);
    ticks.push(`<line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="var(--line)" stroke-width="1.5"/>`);
  }
  const color = score>=85 ? 'var(--signal)' : score>=65 ? 'var(--gold)' : 'var(--ember)';
  return `
  <svg width="180" height="100" viewBox="0 0 180 100">
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="var(--surface-3)" stroke-width="10" stroke-linecap="round"/>
    <path d="M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"/>
    ${ticks.join('')}
  </svg>`;
}

      <div class="eyebrow mb-6">What's checked here</div>
      <div class="muted" style="font-size:12.5px;">Medal, ranking, or result claims against uploaded proof (certificate, official result sheet, federation listing) — separate from identity, since a verified person can still misreport a result.</div>
    </div>
    <div class="card">
      <table class="data-table">
        <thead><tr><th>Athlete</th><th>Claim</th><th>Submitted</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${achievementQueue.map(v=>`
            <tr><td><b>${v.athlete}</b></td><td class="muted">${v.type.replace('Achievement — ','')}</td><td class="faint mono">${v.submitted}</td>
            <td><span class="badge badge-planned">Pending</span></td>
            <td><div class="flex gap-6"><button class="btn btn-primary btn-sm" onclick="this.closest('tr').querySelector('.badge').outerHTML='<span class=&quot;badge badge-verified&quot;>Approved</span>'; this.closest('td').innerHTML='';">Verify against proof</button></div></td></tr>`).join('') || '<tr><td colspan="5" class="muted center" style="padding:20px;">No achievement claims pending.</td></tr>'}
        </tbody>
      </table>
    </div>`;
  } else {
    body = `
    <div class="card mb-14" style="background:var(--surface-2);">
      <div class="eyebrow mb-6">What's checked here</div>
      <div class="muted" style="font-size:12.5px;">Proof of expense, duplicate-request matching, and athlete eligibility — screened for fraud before a request ever reaches a sponsor.</div>
    </div>
    <div class="col gap-14">
      ${pendingRequests.map(r=>{
        const a = athlete(r.athlete);
        return `<div class="card enter">
          <div class="flex between mb-8"><b style="font-size:13.5px;">${a.name} — ${r.title}</b>${badgeForUrgency(r.urgency)}</div>
          <div class="muted" style="font-size:12.5px;">${r.category} · ${money(r.amount)} requested</div>
          <div class="lane-rule" style="margin:10px 0;"></div>
          <div class="grid grid-3" style="font-size:12px;">
            <div><div class="eyebrow">Proof attached</div><div style="margin-top:4px;">📎 receipt_estimate.pdf</div></div>
            <div><div class="eyebrow">Duplicate check</div><div style="margin-top:4px;color:var(--signal);">No overlapping requests found</div></div>
            <div><div class="eyebrow">Identity status</div><div style="margin-top:4px;">✓ Aadhaar-verified athlete</div></div>
          </div>
          <div class="flex gap-10 mt-14">
            <button class="btn btn-primary" style="flex:1;" onclick="alert('Marked verified — prototype only. This would move the request into the sponsor review queue.')">Verify &amp; release to sponsors</button>
            <button class="btn btn-ghost" style="flex:1;" onclick="alert('Flagged for review — prototype only.')">Flag as suspicious</button>
          </div>
        </div>`;
      }).join('') || '<div class="card muted center" style="padding:30px;font-size:13px;">No requests waiting on admin verification.</div>'}
    </div>
    <div class="card mt-20" style="background:var(--surface-2);">
      <div class="eyebrow mb-8">Why this step exists</div>
      <div class="muted" style="font-size:12.5px;line-height:1.6;">Sponsors only ever see requests that have already passed proof and duplicate checks here — this is the platform's first line of defence against inflated or repeated funding asks.</div>
    </div>`;
  }

  return `
  <h1 class="page-title">Verification</h1>
  <p class="page-sub">Identity, achievements, and support requests — kept as separate checks on purpose.</p>
  <div class="grid grid-3 mb-20">
    <div class="card stat-card"><div class="stat-value">${VERIFICATION_QUEUE.length + pendingRequests.length}</div><div class="stat-label">Pending review</div></div>
    <div class="card stat-card"><div class="stat-value">312</div><div class="stat-label">Verified this month</div></div>
    <div class="card stat-card"><div class="stat-value">2.4h</div><div class="stat-label">Avg. review time</div></div>
  </div>
  <div class="tabs">${tabs.map(([id,label])=>`<button class="${sub===id?'active':''}" onclick="state.verifyTab='${id}'; render();">${label}</button>`).join('')}</div>
  ${body}`;
}

function screenSponsorshipMgmt(){
  const expiringSoon = PROGRAMS.filter(p => parseInt(p.expires) <= 30);
  return `
  <h1 class="page-title">Sponsorship Management</h1>
  <p class="page-sub">Create and manage sponsorship programs</p>
  ${expiringSoon.length ? `<div class="card mb-20" style="background:var(--gold-dim);border-color:var(--gold);">
    <div class="flex between" style="align-items:center;">
      <div>
        <div class="eyebrow" style="color:var(--gold);">⏰ Renewal needed</div>
        <div style="font-size:13px;margin-top:4px;">${expiringSoon.map(p=>`<b>${p.name}</b> (${p.sponsor}) expires in ${p.expires}`).join(' · ')}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="alert('Sends renewal notice to sponsor — prototype only.')">Send renewal notice</button>
    </div>
  </div>` : ''}
  <div class="grid grid-3">
    ${PROGRAMS.map(p=>{
      const soon = parseInt(p.expires) <= 30;
      return `
      <div class="card hoverable">
        <div class="flex between" style="align-items:flex-start;">
          <b style="font-size:13.5px;">${p.name}</b>
          ${soon ? `<span class="badge badge-high">${p.expires} left</span>` : ''}
        </div>
        <div class="muted" style="font-size:12px;margin-top:4px;">${p.sponsor}</div>
        <div class="lane-rule" style="margin:12px 0;"></div>
        <div class="flex between" style="font-size:12px;"><span class="faint">Athletes</span><b class="mono">${p.athletes}</b></div>
        <div class="flex between" style="font-size:12px;margin-top:6px;"><span class="faint">Duration</span><b class="mono">${p.duration}</b></div>
        <div class="muted" style="font-size:11.5px;margin-top:10px;line-height:1.5;">${p.rules}</div>
        <button class="btn btn-ghost btn-block btn-sm mt-14" onclick="state.selectedProgram='${p.name.replace(/'/g,"\'")}'; setScreen('assign');">Manage assigned athletes</button>
      </div>`;}).join('')}
    <button class="card center" style="border-style:dashed;color:var(--text-faint);font-size:13px;" onclick="alert('Opens program creation form — prototype only.')">
      ＋ Create new program<br><span class="faint" style="font-size:11.5px;">e.g. "Support 26 athletes for 12 months"</span>
    </button>
  </div>`;
}

function screenAssignAthletes(){
  const name = state.selectedProgram || PROGRAMS[0].name;
  const p = PROGRAMS.find(x=>x.name===name) || PROGRAMS[0];
  const assigned = state.programAssignments[name] || [];
  return `
  <button class="btn btn-ghost btn-sm mb-14" onclick="setScreen('sponsorship-mgmt')">← Back to programs</button>
  <h1 class="page-title">${p.name}</h1>
  <p class="page-sub">${p.sponsor} · ${assigned.length} of ${p.athletes} seats assigned · ${p.duration}</p>
  <div class="card mb-20" style="background:var(--surface-2);">
    <div class="eyebrow mb-8">Program rules</div>
    <div class="muted" style="font-size:12.5px;">${p.rules}</div>
  </div>
  <div class="section-title">Assign athletes</div>
  <div class="col gap-10">
    ${ATHLETES.map(a=>{
      const vis = SPONSOR_CATEGORIES[a.id] || {status:'OPEN'};
      const isOn = assigned.includes(a.id);
      const lockedOut = vis.status==='LOCKED';
      return `<div class="card flex between" style="align-items:center;${lockedOut?'opacity:.55;':''}">
        <div class="flex gap-10" style="align-items:center;">${avatarChip(a,36)}
          <div><b style="font-size:13px;">${a.name}</b><div class="muted" style="font-size:11.5px;">${a.sport.split(' — ')[0]} ${vis.status!=='OPEN'?`· ${badgeForStatus(vis.status)}`:''}</div></div>
        </div>
        ${lockedOut
          ? `<span class="faint" style="font-size:11.5px;">Exclusively sponsored — not assignable</span>`
          : `<button class="btn ${isOn?'btn-primary':'btn-ghost'} btn-sm" onclick="
              const list = state.programAssignments['${name.replace(/'/g,"\'")}'];
              const i = list.indexOf('${a.id}');
              if(i>-1){ list.splice(i,1); } else { list.push('${a.id}'); }
              render();
            ">${isOn?'✓ Assigned':'Assign'}</button>`}
      </div>`;
    }).join('')}
  </div>`;
}

function screenVisibility(){
  return `
  <h1 class="page-title">Visibility Control</h1>
  <p class="page-sub">Sponsorship access logic per athlete</p>
  <div class="flex gap-14 mb-20">
    <div class="card" style="flex:1;"><span class="badge badge-open">OPEN</span><div class="muted" style="font-size:12px;margin-top:8px;">Available for all verified sponsors to discover and support.</div></div>
    <div class="card" style="flex:1;"><span class="badge badge-partial">PARTIAL</span><div class="muted" style="font-size:12px;margin-top:8px;">Existing sponsorship in place, with restrictions on new sponsors.</div></div>
    <div class="card" style="flex:1;"><span class="badge badge-locked">LOCKED</span><div class="muted" style="font-size:12px;margin-top:8px;">Exclusive sponsor access — not discoverable by others.</div></div>
  </div>
  <div class="col gap-10">
    ${VISIBILITY.map(a=>`
      <div class="card">
        <div class="flex between" style="align-items:center;">
          <div class="flex gap-8" style="align-items:center;">${avatarChip(a,30)}<b style="font-size:13px;">${a.name}</b><span class="faint" style="font-size:12px;">${a.sport.split(' — ')[0]}</span></div>
          <div class="flex gap-10" style="align-items:center;">${badgeForStatus(a.status)}<button class="btn btn-ghost btn-sm" onclick="state.expandedVis = state.expandedVis==='${a.id}'?null:'${a.id}'; render();">${state.expandedVis===a.id?'Hide':'Edit access'}</button></div>
        </div>
        ${state.expandedVis===a.id ? `
          <div class="lane-rule" style="margin:12px 0;"></div>
          ${a.status==='OPEN'
            ? `<div class="muted" style="font-size:12.5px;">No exclusive sponsor on file. Visible to all verified sponsors and eligible for crowdsourced public support.</div>`
            : `<div class="grid grid-2" style="font-size:12.5px;">
                <div><div class="eyebrow">Current sponsor</div><div style="margin-top:4px;">${a.sponsor}</div></div>
                <div><div class="eyebrow">Sponsor category</div><div style="margin-top:4px;">${a.category}</div></div>
              </div>
              <div class="muted mt-8" style="font-size:12.5px;line-height:1.6;">${a.restriction}</div>`}
          <div class="flex gap-10 mt-14">
            <button class="chip ${a.status==='OPEN'?'active':''}" onclick="alert('Status change — prototype only.')">Set OPEN</button>
            <button class="chip ${a.status==='PARTIAL'?'active':''}" onclick="alert('Status change — prototype only.')">Set PARTIAL</button>
            <button class="chip ${a.status==='LOCKED'?'active':''}" onclick="alert('Status change — prototype only.')">Set LOCKED</button>
          </div>
        ` : ''}
      </div>`).join('')}
  </div>`;
}

/* ============================================================
   EXPLORE (additional product sections)
   ============================================================ */

function screenGrow(){
  const sub = state.growTab || 'opportunities';
  const tabs = [['opportunities','Opportunities'],['mentors','Mentors'],['second-career','Second Career']];
  let body = '';
  if(sub === 'opportunities'){
    const tagColor = {Competition:'primary', 'Training Camp':'gold', Scholarship:'signal', Sponsorship:'ember'};
    body = `<div class="grid grid-2">
      ${OPPORTUNITIES.map(o=>`
        <div class="card hoverable">
          <span class="badge badge-${tagColor[o.kind]==='primary'?'primary':tagColor[o.kind]==='gold'?'high':tagColor[o.kind]==='signal'?'verified':'critical'}">${o.kind}</span>
          <div style="font-size:14px;font-weight:600;margin:10px 0 4px;">${o.title}</div>
          <div class="muted" style="font-size:12.5px;">${o.meta}</div>
          <div class="lane-rule" style="margin:12px 0;"></div>
          <div class="flex between"><span class="faint" style="font-size:11.5px;">${o.tag}</span><button class="btn btn-outline btn-sm">View details</button></div>
        </div>`).join('')}
    </div>`;
  } else if(sub === 'mentors'){
    body = `<div class="grid grid-3">
      ${MENTORS.map(m=>`
        <div class="card hoverable center">
          <div class="avatar enter" style="background:var(--navy);width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:22px;margin:0 auto 12px;border-radius:50%;">${initials(m.name)}</div>
          <b style="font-size:13.5px;">${m.name}</b>
          <div class="muted" style="font-size:12px;margin-top:2px;">${m.role}</div>
          <div class="faint" style="font-size:11.5px;margin:8px 0;">${m.expertise}</div>
          <div class="eyebrow mb-8">${m.sessions} sessions completed</div>
          <button class="btn btn-primary btn-block btn-sm">Connect</button>
        </div>`).join('')}
    </div>`;
  } else {
    body = `<div class="grid grid-3">
      ${CAREER_PATHS.map(c=>`
        <div class="card hoverable">
          <div style="font-size:26px;">${c.icon}</div>
          <b style="font-size:14.5px;display:block;margin:10px 0 6px;">${c.title}</b>
          <div class="muted" style="font-size:12.5px;line-height:1.6;">${c.desc}</div>
          <button class="btn btn-ghost btn-block btn-sm mt-14">Explore pathway</button>
        </div>`).join('')}
    </div>
    <div class="card mt-20" style="background:var(--surface-2);">
      <div class="eyebrow mb-8">Why this matters</div>
      <div class="muted" style="font-size:12.5px;line-height:1.6;">UAI tracks an athlete's verified record beyond competition — making it the foundation for credentialed second careers in sport.</div>
    </div>`;
  }
  return `
  <h1 class="page-title">Grow</h1>
  <p class="page-sub">Opportunities, mentors, and life after competing — beyond funding.</p>
  <div class="tabs">${tabs.map(([id,label])=>`<button class="${sub===id?'active':''}" onclick="state.growTab='${id}'; render();">${label}</button>`).join('')}</div>
  ${body}`;
}

window.addEventListener('DOMContentLoaded', render);
